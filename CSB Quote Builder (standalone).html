  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#e8e6e1}\n  input,button,select{font-family:inherit}\n  input:focus{outline:none}\n  ::-webkit-scrollbar{width:9px;height:9px}\n  ::-webkit-scrollbar-thumb{background:#2b3138;border-radius:5px}\n  ::-webkit-scrollbar-track{background:transparent}\n  @keyframes led{0%,100%{opacity:1}50%{opacity:.4}}\n  .sqb-in{background:transparent;border:none;color:#e8e6e1;padding:0}\n  .sqb-in::placeholder{color:#565c64}\n  @media (max-width:860px){.sqb-grid{grid-template-columns:1fr!important}.sqb-rack{width:auto!important}}\n  @media print{.sqb-noprint{display:none!important}@page{margin:14mm}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;padding:22px 20px 60px\">\n\n<!-- ================= BUILDER ================= -->\n<sc-if value=\"{{ isBuilder }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"max-width:1180px;margin:0 auto;background:#16191e;border:1px solid #2b3138;border-radius:14px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55)\">\n\n  <!-- header -->\n  <div style=\"display:flex;align-items:center;gap:16px;padding:15px 20px;background:linear-gradient(#1c2026,#171a1f);border-bottom:1px solid #2b3138;flex-wrap:wrap\">\n    <img src=\"47ab405a-70ed-4ed9-8d2b-745e61756b4b\" alt=\"Chicago Sound &amp; Backline\" style=\"height:44px;width:auto;flex:none\">\n    <div style=\"flex:1;min-width:220px\">\n      <input class=\"sqb-in\" style=\"font:700 17px 'Archivo';width:100%\" placeholder=\"Client / event name…\" value=\"{{ client }}\" oninput=\"{{ onClient }}\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-top:3px\">\n        <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.08em\">EVENT DATE<\u002Fspan>\n        <input class=\"sqb-in\" style=\"font:500 10px 'IBM Plex Mono',monospace;color:#9aa0a8;color-scheme:dark\" type=\"date\" value=\"{{ date }}\" oninput=\"{{ onDate }}\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;flex:none\">\n      <span style=\"display:flex;align-items:center;gap:6px;padding:7px 10px;background:#13161a;border-radius:7px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#5aa17f;box-shadow:0 0 6px #5aa17f;animation:led 2.4s infinite\"><\u002Fspan><span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.06em\">AUTOSAVED<\u002Fspan><\u002Fspan>\n      <button style=\"padding:9px 12px;border:1px solid #2b3138;border-radius:7px;background:#1c2026;color:#c9cdd2;font:600 11px 'Archivo';cursor:pointer\" onclick=\"{{ openQuotes }}\">Quotes<\u002Fbutton>\n      <button style=\"padding:9px 12px;border:1px solid #2b3138;border-radius:7px;background:#1c2026;color:#c9cdd2;font:600 11px 'Archivo';cursor:pointer\" onclick=\"{{ openCatalog }}\">Catalog<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- packages -->\n  <div style=\"padding:14px 20px;border-bottom:1px solid #2b3138;background:#13161a\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px\">\n      <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.14em\">PACKAGES · TAP TO ADD · ⋮ TO EDIT<\u002Fspan>\n      <button style=\"padding:5px 10px;border:1px solid #2b3138;border-radius:6px;background:transparent;color:#8a9099;font:600 9px 'IBM Plex Mono',monospace;letter-spacing:.06em;cursor:pointer\" onclick=\"{{ clearAll }}\">CLEAR ALL<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px\">\n      <sc-for list=\"{{ packages }}\" as=\"p\" hint-placeholder-count=\"5\">\n        <div style=\"position:relative\">\n          <button style=\"text-align:left;width:100%;padding:12px 32px 11px 13px;border:1px solid {{ p.border }};border-radius:9px;background:#1c2026;cursor:pointer\" onclick=\"{{ p.add }}\">\n            <div data-comment-anchor=\"71574c364a-div\" style=\"font:600 13px 'Archivo';color:#e8e6e1;line-height:1.2\">{{ p.name }}<\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-top:7px;gap:8px\">\n              <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178\">{{ p.count }}<\u002Fspan>\n              <span style=\"font:700 13px 'IBM Plex Mono',monospace;color:#5aa17f\">{{ p.priceFmt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fbutton>\n          <button title=\"Edit package\" style=\"position:absolute;top:7px;right:7px;width:22px;height:22px;border:none;background:transparent;color:#9aa0a8;cursor:pointer;font:700 15px 'Archivo';line-height:1;border-radius:5px\" onclick=\"{{ p.edit }}\">⋮<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <button style=\"border:1px dashed #3a424b;border-radius:9px;background:transparent;color:#8a9099;font:600 12px 'Archivo';cursor:pointer;min-height:70px;display:flex;align-items:center;justify-content:center\" onclick=\"{{ newPkg }}\">+ New package<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- body -->\n  <div class=\"sqb-grid\" style=\"display:grid;grid-template-columns:1fr 330px\">\n\n    <!-- PATCH BAY -->\n    <div style=\"padding:15px 18px;border-right:1px solid #2b3138\">\n      <!-- settings -->\n      <div style=\"display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid #1f242a\">\n        <div>\n          <div style=\"font:500 8px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.12em;margin-bottom:6px\">DISCOUNT<\u002Fdiv>\n          <div style=\"display:flex;gap:4px\">\n            <sc-for list=\"{{ discountChips }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <button style=\"padding:6px 9px;border-radius:5px;border:1px solid {{ d.border }};background:{{ d.bg }};color:{{ d.color }};font:600 10px 'IBM Plex Mono',monospace;cursor:pointer\" onclick=\"{{ d.set }}\">{{ d.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:400 10px 'Archivo';color:#565c64;max-width:340px;line-height:1.4\">À-la-carte gear below adds individual priced lines. Packages price as one line and hide their contents' prices from the client.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- gear search -->\n      <div style=\"margin-bottom:10px;position:relative\">\n        <input class=\"sqb-in\" style=\"width:100%;font:500 12px 'Archivo';color:#e8e6e1;background:#13161a;border:1px solid #2b3138;border-radius:8px;padding:9px 12px 9px 30px\" placeholder=\"Search all gear… e.g. montage, les paul, cdj, congas\" value=\"{{ gearSearch }}\" oninput=\"{{ onGearSearch }}\">\n        <span style=\"position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#565c64;font:600 12px 'Archivo'\">⌕<\u002Fspan>\n        <sc-if value=\"{{ hasGearSearch }}\"><span style=\"position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#8a9099;font:600 13px 'Archivo';cursor:pointer\" onclick=\"{{ clearGearSearch }}\">×<\u002Fspan><\u002Fsc-if>\n      <\u002Fdiv>\n      <!-- category chips -->\n      <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px\" data-comment-anchor=\"82f5db9ede-div\">\n        <sc-for list=\"{{ categories }}\" as=\"c\" hint-placeholder-count=\"9\">\n          <button style=\"display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:16px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};font:600 9.5px 'IBM Plex Mono',monospace;letter-spacing:.04em;cursor:pointer\" onclick=\"{{ c.select }}\">\n            <span>{{ c.name }}<\u002Fspan>\n            <sc-if value=\"{{ c.hasCount }}\"><span style=\"min-width:15px;height:15px;padding:0 4px;border-radius:8px;background:{{ c.badgeBg }};color:{{ c.badgeColor }};font:600 8px 'IBM Plex Mono',monospace;display:inline-flex;align-items:center;justify-content:center\">{{ c.count }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- gear tiles -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;max-height:420px;overflow-y:auto;padding-right:4px\">\n        <sc-for list=\"{{ gear }}\" as=\"g\" hint-placeholder-count=\"6\">\n          <div style=\"padding:11px;border:1px solid {{ g.border }};border-radius:9px;background:{{ g.bg }};cursor:pointer;display:flex;flex-direction:column;min-height:96px\" onclick=\"{{ g.add }}\">\n            <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ g.led }};box-shadow:{{ g.ledGlow }}\"><\u002Fspan>\n              <sc-if value=\"{{ g.inQuote }}\"><span style=\"font:600 11px 'IBM Plex Mono',monospace;color:#d97757\">{{ g.qtyLabel }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"font:600 11.5px 'Archivo';color:#e8e6e1;line-height:1.2;margin-top:8px;flex:1\">{{ g.name }}<sc-if value=\"{{ g.isGroup }}\"><span style=\"font:500 8px 'IBM Plex Mono',monospace;color:#c98a6a;background:#241a15;padding:1px 4px;border-radius:3px;margin-left:5px;white-space:nowrap\">KIT<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:8px\">\n              <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178\">{{ g.dailyFmt }} EA<\u002Fspan>\n              <sc-if value=\"{{ g.inQuote }}\">\n                <span style=\"display:flex;align-items:center;gap:0;border:1px solid #2b3138;border-radius:6px;overflow:hidden\" onclick=\"{{ g.stop }}\">\n                  <span style=\"width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:#d97757;font:600 13px 'Archivo';background:#1c2026;line-height:1\" onclick=\"{{ g.dec }}\">−<\u002Fspan>\n                  <span style=\"width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:#d97757;font:600 13px 'Archivo';background:#1c2026;line-height:1\" onclick=\"{{ g.inc }}\">+<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ g.notInQuote }}\"><span style=\"font:600 9px 'IBM Plex Mono',monospace;color:#565c64\">TAP +<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- THE RACK -->\n    <div class=\"sqb-rack\" style=\"width:330px;background:#13161a;display:flex;flex-direction:column\">\n      <div style=\"padding:13px 15px 9px;display:flex;justify-content:space-between;align-items:baseline\">\n        <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.14em\">THE RACK<\u002Fspan>\n        <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#6b7178\">{{ unitsLabel }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- scroll area: packages + gear + richness + labor -->\n      <div style=\"flex:1;overflow-y:auto;padding:0 13px;max-height:430px\">\n\n        <!-- cart packages -->\n        <sc-if value=\"{{ hasCart }}\">\n          <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:6px\">\n            <sc-for list=\"{{ cartLines }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <div style=\"padding:8px 9px;background:#20191c;border:1px solid #3a2f2a;border-radius:7px\">\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <span style=\"display:flex;align-items:center;gap:0;border:1px solid #3a2f2a;border-radius:5px;overflow:hidden;flex:none\">\n                    <span style=\"width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#d97757;font:600 12px 'Archivo';background:#13161a;cursor:pointer;line-height:1\" onclick=\"{{ c.dec }}\">−<\u002Fspan>\n                    <span style=\"min-width:20px;text-align:center;font:600 10px 'IBM Plex Mono',monospace;color:#e8e6e1\">{{ c.qty }}<\u002Fspan>\n                    <span style=\"width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#d97757;font:600 12px 'Archivo';background:#13161a;cursor:pointer;line-height:1\" onclick=\"{{ c.inc }}\">+<\u002Fspan>\n                  <\u002Fspan>\n                  <span style=\"flex:1;font:600 10.5px 'Archivo';color:#e8e6e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.name }}<\u002Fspan>\n                  <span style=\"font:600 10.5px 'IBM Plex Mono',monospace;color:#5aa17f\">{{ c.priceFmt }}<\u002Fspan>\n                  <span style=\"color:#565c64;font:600 12px 'Archivo';cursor:pointer;line-height:1;flex:none\" onclick=\"{{ c.remove }}\">×<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font:400 9px 'Archivo';color:#7a6a63;margin-top:5px;line-height:1.45\">{{ c.includes }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- a la carte gear -->\n        <sc-if value=\"{{ hasLines }}\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <sc-for list=\"{{ lines }}\" as=\"l\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:8px 9px;background:#1c2026;border:1px solid #2b3138;border-radius:7px\">\n                <span style=\"display:flex;align-items:center;gap:0;border:1px solid #2b3138;border-radius:5px;overflow:hidden;flex:none\">\n                  <span style=\"width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#d97757;font:600 12px 'Archivo';background:#13161a;cursor:pointer;line-height:1\" onclick=\"{{ l.dec }}\">−<\u002Fspan>\n                  <span style=\"min-width:20px;text-align:center;font:600 10px 'IBM Plex Mono',monospace;color:#e8e6e1\">{{ l.qty }}<\u002Fspan>\n                  <span style=\"width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#d97757;font:600 12px 'Archivo';background:#13161a;cursor:pointer;line-height:1\" onclick=\"{{ l.inc }}\">+<\u002Fspan>\n                <\u002Fspan>\n                <span style=\"flex:1;font:500 10.5px 'Archivo';color:#e8e6e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ l.name }}<\u002Fspan>\n                <span style=\"font:600 10.5px 'IBM Plex Mono',monospace;color:#e8e6e1\">{{ l.lineFmt }}<\u002Fspan>\n                <span style=\"color:#565c64;font:600 12px 'Archivo';cursor:pointer;line-height:1;flex:none\" onclick=\"{{ l.remove }}\">×<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isEmpty }}\">\n          <div style=\"padding:30px 14px;text-align:center;border:1px dashed #2b3138;border-radius:8px\">\n            <div style=\"font:500 11px 'Archivo';color:#8a9099\">Nothing added yet<\u002Fdiv>\n            <div style=\"font:400 10px 'Archivo';color:#565c64;margin-top:4px\">Tap a package above, or tap gear to add à-la-carte<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- richness (adjustable, internal) -->\n        <div style=\"margin:12px 0;padding:11px;background:#191c21;border:1px solid #2b3138;border-radius:8px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center\">\n            <span style=\"font:500 8.5px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.1em\" data-comment-anchor=\"923d06b960-span\">CLIENT AFFLUENCE<\u002Fspan>\n            <span style=\"font:500 8px 'IBM Plex Mono',monospace;color:#c98a6a;background:#241a15;padding:2px 5px;border-radius:3px\">INTERNAL ONLY<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:3px;margin-top:9px\">\n            <sc-for list=\"{{ richSegs }}\" as=\"s\" hint-placeholder-count=\"10\">\n              <span style=\"flex:1;height:16px;border-radius:3px;background:{{ s.bg }};cursor:pointer\" onclick=\"{{ s.set }}\"><\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;margin-top:7px\">\n            <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#9aa0a8\">{{ richnessLabel }}<\u002Fspan>\n            <span style=\"font:500 9px 'IBM Plex Mono',monospace;color:#d97757\">{{ richUpLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- labor input -->\n        <div style=\"margin:0 0 12px;padding:11px;background:#191c21;border:1px solid #2b3138;border-radius:8px\">\n          <div style=\"font:500 8.5px 'IBM Plex Mono',monospace;color:#6b7178;letter-spacing:.1em;margin-bottom:8px\">LABOR<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;padding:9px 11px;background:#13161a;border:1px solid #2b3138;border-radius:7px\">\n            <span style=\"font:600 14px 'IBM Plex Mono',monospace;color:#6b7178\">$<\u002Fspan>\n            <input class=\"sqb-in\" style=\"flex:1;font:600 15px 'IBM Plex Mono',monospace;color:#e8e6e1\" type=\"number\" min=\"0\" step=\"25\" placeholder=\"0\" value=\"{{ laborInput }}\" oninput=\"{{ onLabor }}\" data-comment-anchor=\"7aaa7a893f-input\">\n          <\u002Fdiv>\n          <div style=\"font:400 9px 'Archivo';color:#565c64;margin-top:6px\">Arrows step by $25. Richness upcharge is added automatically and stays off the client's quote.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- totals footer (pinned) -->\n      <div style=\"padding:12px 15px;border-top:1px solid #2b3138;background:#16191e\">\n        <div style=\"display:flex;justify-content:space-between;padding:3px 0\"><span style=\"font:400 10.5px 'Archivo';color:#9aa0a8\">Rental subtotal<\u002Fspan><span style=\"font:500 10.5px 'IBM Plex Mono',monospace;color:#c9cdd2\">{{ subtotalFmt }}<\u002Fspan><\u002Fdiv>\n        <sc-if value=\"{{ hasDiscount }}\"><div style=\"display:flex;justify-content:space-between;pa e.items.some(x => x.cid === 'drumkit')) return line;\n      const items = fixDrum(line.items);\n      return {...line, items, price: priceOf(items)};\n    });\n    const quotes = (this.load('sqb_quotes') || []).map(q => q.snapshot ? {...q, snapshot:{...q.snapshot, cart: fixCart(q.snapshot.cart)}} : q);\n    const draft = this.load('sqb_draft') || {};\n    this.setState({\n      catalog, packages, quotes,\n      client: draft.client || '',\n      date: draft.date || '',\n      discount: draft.discount || 0,\n      labor: draft.labor || 0,\n      richness: draft.richness || 5,\n      lines: draft.lines || {},\n      cart: fixCart(draft.cart || []),\n    });\n  }\n\n  componentDidUpdate() {\n    if (!this.state.catalog) return;\n    this.save('sqb_catalog', this.state.catalog);\n    this.save('sqb_packages', this.state.packages);\n    this.save('sqb_quotes', this.state.quotes);\n    this.save('sqb_draft', {\n      client:this.state.client, date:this.state.date, discount:this.state.discount,\n      labor:this.state.labor, richness:this.state.richness,\n      lines:this.state.lines, cart:this.state.cart,\n    });\n  }\n\n  load(k){ try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } }\n  save(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }\n  fmt(n){ return '$' + Math.round(n||0).toLocaleString('en-US'); }\n  byId(){ const m={}; (this.state.catalog||[]).forEach(i=>m[i.id]=i); return m; }\n\n  // pricing helpers (group-aware)\n  subDaily(sd){ return (sd.purchase||0)*(sd.rate||0); }\n  groupDaily(it, included){ if(!it||!it.subs) return 0; return it.subs.filter(sd => !included || included.indexOf(sd.id)>=0).reduce((a,sd)=>a+this.subDaily(sd),0); }\n  itemDaily(it){ return it.group ? this.groupDaily(it) : (it.purchase||0)*(it.rate||0); }\n\n  // ---- a la carte gear ----\n  setLine(id, q){ this.setState(s => { const lines = {...s.lines}; if (q <= 0) delete lines[id]; else lines[id] = q; return { lines }; }); }\n  bump(id, delta){ const cur = this.state.lines[id]||0; this.setLine(id, cur+delta); }\n\n  // ---- packages: pricing ----\n  contentDaily(c, entry){ if(!c) return 0; return c.group ? this.groupDaily(c, entry && entry.subs) : this.itemDaily(c); }\n  pkgAutoPrice(items){ const b=this.byId(); return (items||[]).reduce((a,it)=>{ const c=b[it.cid]; return a + it.qty*this.contentDaily(c, it); },0); }\n  pkgPrice(pkg){ return (pkg.priceAuto!==false) ? this.pkgAutoPrice(pkg.items) : (pkg.price||0); }\n  pkgSummary(items){ const b=this.byId(); return (items||[]).map(it=>{ const c=b[it.cid];\n    if(!c) return it.qty+'× (deleted)';\n    if(c.group){ const inc = it.subs || c.subs.map(x=>x.id); const names = c.subs.filter(sd=>inc.indexOf(sd.id)>=0).map(sd=>sd.name); return it.qty+'× '+c.name+' ['+names.join(', ')+']'; }\n    return it.qty+'× '+c.name; }).join('  ·  '); }\n\n  // ---- cart ----\n  addPkgToCart(pkg){ const price=this.pkgPrice(pkg);\n    this.setState(s => ({ cart:[...s.cart, { uid:'u'+Date.now()+Math.floor(Math.random()*999), pkgId:pkg.id, name:pkg.name, price, items:pkg.items.map(x=>({...x, subs:x.subs?[...x.subs]:undefined})), qty:1 }] })); }\n  cartBump(uid, delta){ this.setState(s => ({ cart: s.cart.map(c=>c.uid===uid?{...c,qty:c.qty+delta}:c).filter(c=>c.qty>0) })); }\n  cartRemove(uid){ this.setState(s => ({ cart: s.cart.filter(c=>c.uid!==uid) })); }\n\n  // ---- package editor ----\n  openPkgEditor(pkg){ this.setState({ showPkgEditor:true, pkgDraft:{ id:pkg.id, name:pkg.name, items:pkg.items.map(x=>({...x, subs:x.subs?[...x.subs]:undefined})), price:pkg.price, priceAuto:pkg.priceAuto!==false } }); }\n  newPkg(){ this.setState({ showPkgEditor:true, pkgDraft:{ id:'p'+Date.now(), name:'New package', items:[], price:0, priceAuto:true } }); }\n  closePkgEditor(){ this.setState({ showPkgEditor:false, pkgDraft:null, pkgSearchCid:null, pkgSearchQuery:'' }); }\n  pkgOpenSearch(cid){ this.setState({ pkgSearchCid:cid, pkgSearchQuery:'' }); }\n  pkgSetSearch(v){ this.setState({ pkgSearchQuery:v }); }\n  pkgCloseSearch(){ this.setState({ pkgSearchCid:null, pkgSearchQuery:'' }); }\n  openPkgAdd(){ this.setState({ pkgAddOpen:true, pkgAddQuery:'' }); }\n  setPkgAddQuery(v){ this.setState({ pkgAddQuery:v }); }\n  closePkgAdd(){ this.setState({ pkgAddOpen:false, pkgAddQuery:'' }); }\n  setPkgName(v){ this.setState(s=>({ pkgDraft:{...s.pkgDraft, name:v} })); }\n  pkgItemBump(cid, delta){ this.setState(s=>{ const d={...s.pkgDraft}; let items=d.items.map(x=>({...x})); const it=items.find(x=>x.cid===cid);\n    if(it){ it.qty+=delta; if(it.qty<=0) items=items.filter(x=>x.cid!==cid); } d.items=items; return {pkgDraft:d}; }); }\n  pkgItemRemove(cid){ this.setState(s=>({ pkgDraft:{...s.pkgDraft, items:s.pkgDraft.items.filter(x=>x.cid!==cid)} })); }\n  pkgItemAdd(cid){ if(!cid) return; this.setState(s=>{ const d={...s.pkgDraft}; if(d.items.find(x=>x.cid===cid)) return {}; d.items=[...d.items,{cid,qty:1}]; return {pkgDraft:d}; }); }\n  pkgToggleSub(cid, subId){ this.setState(s=>{ const g=(s.catalog||[]).find(x=>x.id===cid); if(!g||!g.subs) return {};\n    const allIds=g.subs.map(x=>x.id); const d={...s.pkgDraft}; const items=d.items.map(x=>({...x, subs:x.subs?[...x.subs]:undefined}));\n    const it=items.find(x=>x.cid===cid); if(!it) return {}; let inc = it.subs || allIds.slice();\n    if(inc.indexOf(subId)>=0) inc=inc.filter(id=>id!==subId); else inc=[...inc, subId];\n    it.subs=inc; d.items=items; return {pkgDraft:d}; }); }\n  setPkgPrice(v){ const n=parseFloat(v); this.setState(s=>({ pkgDraft:{...s.pkgDraft, price:isNaN(n)?0:n, priceAuto:false} })); }\n  pkgResetAuto(){ this.setState(s=>({ pkgDraft:{...s.pkgDraft, priceAuto:true} })); }\n  commitPkg(addToCart){ const d=this.state.pkgDraft; if(!d) return;\n    const name=(d.name||'').trim()||'New package'; const items=d.items.filter(x=>x.qty>0);\n    const pkg={ id:d.id, name, items, price:d.price, priceAuto:d.priceAuto };\n    this.setState(s => { const exists=s.packages.some(p=>p.id===d.id);\n      const packages= exists ? s.packages.map(p=>p.id===d.id?pkg:p) : [...s.packages, pkg];\n      let cart=s.cart;\n      if(addToCart && items.length){ const price=(pkg.priceAuto!==false)?this.pkgAutoPrice(items):(pkg.price||0);\n        cart=[...s.cart, { uid:'u'+Date.now()+Math.floor(Math.random()*999), pkgId:pkg.id, name, price, items:items.map(x=>({...x, subs:x.subs?[...x.subs]:undefined})), qty:1 }]; }\n      return { packages, cart, showPkgEditor:false, pkgDraft:null }; }); }\n  deletePkg(){ const id=this.state.pkgDraft&&this.state.pkgDraft.id; this.setState(s=>({ packages:s.packages.filter(p=>p.id!==id), showPkgEditor:false, pkgDraft:null })); }\n\n  // ---- catalog editor ----\n  updateCat(id, field, value){ this.setState(s => ({ catalog: s.catalog.map(it => it.id===id ? {...it,[field]:value} : it) })); }\n  removeCat(id){ this.setState(s => ({ catalog: s.catalog.filter(x=>x.id!==id) })); }\n  addCatalog(){ const id='c'+Date.now(); this.setState(s => ({ catalog:[...s.catalog, {id, name:'New item', category:s.activeCat, purchase:100, rate:0.1}] })); }\n  addGroup(){ const id='g'+Date.now();\n    this.setState(s => ({ catalog:[...s.catalog, {id, name:'New group (kit)', category:s.activeCat, group:true, subs:[{id:'s'+Date.now(), name:'New piece', purchase:100, rate:0.1}]}], expandedGroups:{...s.expandedGroups,[id]:true} })); }\n  toggleGroup(id){ this.setState(s => ({ expandedGroups:{...s.expandedGroups, [id]: !s.expandedGroups[id]} })); }\n  updateSub(gid, subId, field, value){ this.setState(s => ({ catalog: s.catalog.map(it => it.id===gid ? {...it, subs: it.subs.map(sd=>sd.id===subId?{...sd,[field]:value}:sd)} : it) })); }\n  addSub(gid){ const sid='s'+Date.now(); this.setState(s => ({ catalog: s.catalog.map(it => it.id===gid ? {...it, subs:[...it.subs, {id:sid, name:'New piece', purchase:100, rate:0.1}]} : it) })); }\n  removeSub(gid, subId){ this.setState(s => ({ catalog: s.catalog.map(it => it.id===gid ? {...it, subs: it.subs.filter(sd=>sd.id!==subId)} : it) })); }\n\n  fmtDate(iso){ if(!iso) return '—'; const p=iso.split('-'); if(p.length!==3) return iso;\n    const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return mo[parseInt(p[1],10)-1]+' '+parseInt(p[2],10)+', '+p[0]; }\n\n  renderVals() {\n    const s = this.state;\n    const catalog = s.catalog || this.defaultCatalog();\n    const packages = s.packages || this.defaultPackages();\n    const byId = {}; catalog.forEach(i => byId[i.id] = i);\n\n    // à la carte gear lines\n    const lineIds = Object.keys(s.lines).filter(id => s.lines[id] > 0 && byId[id]);\n    let gearSub = 0;\n    const lines = lineIds.map(id => {\n      const it = byId[id]; const q = s.lines[id]; const daily = this.itemDaily(it); const lineTotal = q * daily;\n      gearSub += lineTotal;\n      return { id, name: it.name, qty: q, qtyLabel:'×'+q, dailyFmt:this.fmt(daily), lineFmt:this.fmt(lineTotal),\n        inc:(e)=>{ e&&e.stopPropagation&&e.stopPropagation(); this.bump(id,1); },\n        dec:(e)=>{ e&&e.stopPropagation&&e.stopPropagation(); this.bump(id,-1); },\n        remove:(e)=>{ e&&e.stopPropagation&&e.stopPropagation(); this.setLine(id,0); } };\n    });\n\n    // cart packages\n    let pkgTotal = 0;\n    const cartLines = (s.cart||[]).map(c => { const total=c.price*c.qty; pkgTotal+=total;\n      return { uid:c.uid, name:c.name, qty:c.qty, priceFmt:this.fmt(total), includes:this.pkgSummary(c.items),\n        inc:()=>this.cartBump(c.uid,1), dec:()=>this.cartBump(c.uid,-1), remove:()=>this.cartRemove(c.uid) }; });\n\n    const subtotal = gearSub + pkgTotal;\n    const discountAmt = subtotal * s.discount / 100;\n    const richPct = (s.richness / 10) * 0.20;\n    const laborFinal = s.labor * (1 + richPct);\n    const grand = subtotal - discountAmt + laborFinal;\n\n    // gear tiles — search across all categories, else active category\n    const gq = (s.gearSearch||'').trim().toLowerCase();\n    const gearSource = gq ? catalog.filter(i => (i.name+' '+i.category).toLowe lter(c => !d.items.find(x=>x.cid===c.id) && (!aq || (c.name+' '+c.category).toLowerCase().indexOf(aq)>=0))\n            .map(c => ({ value:c.id, name: c.name + (c.group?' · kit':''), dailyFmt: self.fmt(self.itemDaily(c)) + '/day', add:()=>{ self.pkgItemAdd(c.id); } })); })(this),\n        pkgPriceInput: eff ? String(Math.round(eff)) : '',\n        pkgAutoFmt: this.fmt(autoSum), pkgAutoTag: d.priceAuto?'AUTO':'CUSTOM', pkgAutoTagColor: d.priceAuto?'#5aa17f':'#c98a6a', pkgPriceBorder: d.priceAuto?'#2b3138':'#3a2f2a',\n      };\n      pkgVals.pkgAddNone = pkgVals.pkgAddOptions.length===0;\n    }\n\n    const isEmpty = lineIds.length===0 && (s.cart||[]).length===0;\n    const totalLines = lineIds.length + (s.cart||[]).length;\n\n    return {\n      isBuilder: s.view==='builder', isPrint: s.view==='print',\n      showCatalog: s.showCatalog, showQuotes: s.showQuotes, showPkgEditor: s.showPkgEditor,\n      client: s.client, date: s.date,\n      onClient:(e)=>this.setState({client:e.target.value}), onDate:(e)=>this.setState({date:e.target.value}),\n      discountChips, categories, gear, packages: packageCards, richSegs, savedQuotes, catalogRender, catOptions: this.CATS,\n      gearSearch: s.gearSearch, hasGearSearch: gq.length>0, onGearSearch:(e)=>this.setState({gearSearch:e.target.value}), clearGearSearch:()=>this.setState({gearSearch:''}),\n      pkgAddOpen: s.pkgAddOpen, pkgAddClosed: !s.pkgAddOpen, pkgAddQuery: s.pkgAddQuery,\n      openPkgAdd:()=>this.openPkgAdd(), onPkgAddSearch:(e)=>this.setPkgAddQuery(e.target.value), closePkgAdd:()=>this.closePkgAdd(),\n      pkgAddNone: pkgVals.pkgAddNone,\n      unitsLabel: totalLines + (totalLines===1?' LINE':' LINES'),\n      hasCart: (s.cart||[]).length>0, hasLines: lineIds.length>0, isEmpty, lines, cartLines,\n      richnessLabel: s.richness + ' / 10', richUpLabel: '+' + Math.round(richPct*100) + '% LABOR',\n      laborInput: s.labor || '', onLabor:(e)=>this.setState({labor:parseFloat(e.target.value)||0}),\n      subtotalFmt:
